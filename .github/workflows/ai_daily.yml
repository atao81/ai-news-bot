name: AI动向新闻机器人

on:
  schedule:
    # 每天 09:00 发早报 (UTC+8 = 01:00 UTC)
    - cron: "0 1 * * *"
  workflow_dispatch:  # 手动触发

jobs:
  morning:
    name: 早报 09:00
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 发送早报
        env:
          EMAIL_SENDER: 77193799@qq.com
          EMAIL_RECEIVER: 77193799@qq.com
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SMTP_HOST: smtp.qq.com
          SMTP_PORT: 587
        run: python scripts/fetch_ai_news.py --morning

  evening:
    name: 晚报 21:00
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 发送晚报
        env:
          EMAIL_SENDER: 77193799@qq.com
          EMAIL_RECEIVER: 77193799@qq.com
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SMTP_HOST: smtp.qq.com
          SMTP_PORT: 587
        run: python scripts/fetch_ai_news.py --evening

  manual:
    name: 手动测试
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 手动测试运行
        env:
          EMAIL_SENDER: 77193799@qq.com
          EMAIL_RECEIVER: 77193799@qq.com
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SMTP_HOST: smtp.qq.com
          SMTP_PORT: 587
        run: python scripts/fetch_ai_news.py --morning --evening
