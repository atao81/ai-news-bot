giteeci:
  push:
    branches: [master]
  # 定时: UTC 01:00=北京时间09:00, UTC 13:00=北京时间21:00
  trigger_timer:
    - cron: "0 1,13 * * *"

FetchNews:
  stage: build
  script:
    - cd $CI_WORKSPACE
    - python3 --version
    - python3 scripts/fetch_ai_news.py --morning
  artifacts:
    paths:
      - latest_report.md

SendMail:
  stage: deploy
  needs: [FetchNews]
  script:
    - cd $CI_WORKSPACE
    - python3 << MAILSCRIPT
import smtplib, os
from email.mime.text import MIMEText
from email.mime.multipart import MIMEMultipart

body = open("latest_report.md").read() if os.path.exists("latest_report.md") else "无报告内容"

msg = MIMEMultipart('alternative')
msg['Subject'] = '📮 AI动向晚报'
msg['From'] = os.environ['MAIL_FROM']
msg['To'] = os.environ['MAIL_TO']
msg.attach(MIMEText(body, 'plain', 'utf-8'))

try:
    with smtplib.SMTP(os.environ.get('MAIL_SMTP','smtp.qq.com'), 
                      int(os.environ.get('MAIL_PORT','587'))) as s:
        s.starttls()
        s.login(os.environ['MAIL_FROM'], os.environ['MAIL_PASS'])
        s.sendmail(os.environ['MAIL_FROM'], [os.environ['MAIL_TO']], msg.as_string())
        print('✅ 邮件发送成功')
except Exception as e:
    print(f'❌ 发送失败: {e}')
MAILSCRIPT
