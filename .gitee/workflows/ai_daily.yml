# Gitee Go 流水线 - AI动向晚报
# 每天 09:00 早报 + 21:00 晚报，云端自动运行

显示名称: AI动向新闻机器人

阶段:
  - name: 早报
    trigger: 定时
    cron: "0 9 * * *"
    tag: latest
    steps:
      - name: 拉取最新代码
        command: |
          cd /pipelines/workspace/${GITEE_REPO_NAME}
          git pull origin master
      - name: 安装依赖
        command: |
          cd /pipelines/workspace/${GITEE_REPO_NAME}
          pip3 install requests beautifulsoup4
      - name: 发送早报
        command: |
          cd /pipelines/workspace/${GITEE_REPO_NAME}
          python3 scripts/fetch_ai_news.py --morning
        env:
          EMAIL_SENDER: "77193799@qq.com"
          EMAIL_RECEIVER: "77193799@qq.com"
          EMAIL_PASSWORD: "${EMAIL_PASSWORD}"
          SMTP_HOST: "smtp.qq.com"
          SMTP_PORT: "587"

  - name: 晚报
    trigger: 定时
    cron: "0 21 * * *"
    tag: latest
    steps:
      - name: 拉取最新代码
        command: |
          cd /pipelines/workspace/${GITEE_REPO_NAME}
          git pull origin master
      - name: 安装依赖
        command: |
          cd /pipelines/workspace/${GITEE_REPO_NAME}
          pip3 install requests beautifulsoup4
      - name: 发送晚报
        command: |
          cd /pipelines/workspace/${GITEE_REPO_NAME}
          python3 scripts/fetch_ai_news.py --evening
        env:
          EMAIL_SENDER: "77193799@qq.com"
          EMAIL_RECEIVER: "77193799@qq.com"
          EMAIL_PASSWORD: "${EMAIL_PASSWORD}"
          SMTP_HOST: "smtp.qq.com"
          SMTP_PORT: "587"
